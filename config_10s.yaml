
# 矿车轨迹跟踪模型配置（10s 轨迹版本）
# state:   (lateral_error, s_error, heading_error, v, a, kappa)  6维
# target:  (v_ref, a_ref, kappa_ref)                             3维，来自planning
# context: (pitch, load)                                         2维，坡度+负载

# Model -------------------------------
device: cpu
state_dim: 6      # lateral_error, s_error, heading_error, v, a, kappa
target_dim: 3     # v_ref, a_ref, kappa_ref
context_dim: 2    # pitch(rad), load(0=轻载/1=重载)
horizon: 49       # 历史/未来窗口长度（2H+1=99步 state_seq，3H=147步 target_seq）
train_horizon: 49 # predictor 训练展开步数（4.9s rollout，上限 2*horizon-1=97）

# predictor（闭环动力学模型）
# 输入包含context，表示"当前坡度和负载下，期望轨迹的实际响应"
predictor_type: mlp_norm
predictor_dropout: 0.1
predictor_max_range: 1.0
predictor_hidden_dim: 512
predictor_hidden_depth: 4
predictor_lr: 0.00005
predictor_weight_decay: 0.01
predictor_max_norm: 2
predictor_discount: 0.95
predictor_k_lateral: 0.3
predictor_k_s: 1.5
predictor_k_heading: 0.3
predictor_k_v: 3.0
predictor_k_a: 1.0
predictor_k_kappa: 0.5
predictor_stable_k: 0.0

# controller（轨迹调整策略）
controller_type: mlp_norm
controller_dropout: 0.0
controller_max_range: 0.5
controller_hidden_dim: 512
controller_hidden_depth: 4
controller_lr: 0.001
controller_max_norm: 2
controller_T_max: 0.0
controller_discount: 0.98
controller_train_horizon: 49  # controller rollout步数（上限 = horizon = 49）
controller_smooth_k: 1.0
controller_stable_k: 0.0
controller_k_lateral: 0.0
controller_k_s: 1.5
controller_k_heading: 0.0
controller_k_v: 3.0
controller_k_a: 1.5
controller_k_kappa: 0.0

# Training ------------------------------
batch_size: 4096
predictor_epochs: 30
controller_epochs: 30
save_dir: state_dict/10s   # 模型权重保存目录
log_dir: logs/10s          # 训练日志目录

# Data ----------------------------------
data_step: 0.1
traj_duration: 10.0
traj_points: 100  # traj_duration / data_step
