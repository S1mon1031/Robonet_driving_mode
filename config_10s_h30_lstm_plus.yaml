
# 矿车轨迹跟踪模型配置（10s 轨迹，horizon=30，LSTMPlus predictor 版本）
# 相比 lstm 版本的升级：
#   1. seq_input 进 LSTM 前加 InputLayerNorm，稳定序列输入分布
#   2. 解码头改用 mlp_norm（NormedLinear: Linear→Dropout→LayerNorm→ELU）
#   3. 保留 hx 传递，rollout 时单步复用 hidden state

# Model -------------------------------
device: cpu
state_dim: 6      # lateral_error, s_error, heading_error, v, a, kappa
target_dim: 3     # v_ref, a_ref, kappa_ref
context_dim: 2    # pitch(rad), load(0=轻载/1=重载)
horizon: 30       # 历史窗口长度（H=30 → 3s 历史序列）
train_horizon: 30 # predictor 训练展开步数（3s rollout）

# predictor（LSTMPlus 闭环动力学模型）
predictor_type: lstm_plus
predictor_dropout: 0.1
predictor_max_range: 1.0
lstm_hidden_size: 128
lstm_num_layers: 2
lstm_head_dim: 128
# 以下参数 lstm_plus 模式下不使用，保留以兼容 parser
predictor_hidden_dim: 256
predictor_hidden_depth: 4
predictor_lr: 0.0001
predictor_weight_decay: 0.01
predictor_max_norm: 2
predictor_discount: 1.0
predictor_k_lateral: 0.0
predictor_k_s: 1.5
predictor_k_heading: 0.0
predictor_k_v: 3.0
predictor_k_a: 1.5
predictor_k_kappa: 0.0
predictor_stable_k: 0.0

# controller（mlp_norm，与 h30 版相同）
controller_type: mlp_norm
controller_dropout: 0.0
controller_max_range: 0.15
controller_hidden_dim: 256
controller_hidden_depth: 4
controller_lr: 0.0002
controller_max_norm: 2
controller_T_max: 30
controller_discount: 0.98
controller_train_horizon: 10
controller_smooth_k: 1.0
controller_stable_k: 0.0
controller_k_lateral: 0.0
controller_k_s: 0.5
controller_k_heading: 0.0
controller_k_v: 3.0
controller_k_a: 0.5
controller_k_kappa: 0.0

# Training ------------------------------
batch_size: 4096
predictor_epochs: 200
controller_epochs: 0
save_dir: state_dict/10s_h30_lstm_plus
log_dir: logs/10s_h30_lstm_plus

# Data ----------------------------------
data_step: 0.1
traj_duration: 10.0
traj_points: 100  # traj_duration / data_step
