
# 矿车轨迹跟踪模型配置（10s 轨迹，horizon=30，LSTM predictor 版本）
# state:   (lateral_error, s_error, heading_error, v, a, kappa)  6维
# target:  (v_ref, a_ref, kappa_ref)                             3维，来自planning
# context: (pitch, load)                                         2维，坡度+负载
#
# 与 config_10s_h30.yaml (mlp_norm) 的区别：
#   predictor_type: lstm
#   LSTM 序列输入: (batch, H=30, state_dim+target_dim=9)  历史3s
#   LSTM extra 输入: state(6) + target(3) + next_target(3) + context(2) = 14
#   LSTM hidden: 256，layers: 2，head_dim: 256
#   参数量估算: ~900K（vs mlp_norm ~470K），但序列建模能力更强
#
# 梯度分析：
#   LSTM cell state 加法更新 c_t = f·c_{t-1} + i·g
#   类似 ResNet skip，梯度高速路，rollout 训练时梯度消失更慢

# Model -------------------------------
device: cpu
state_dim: 6      # lateral_error, s_error, heading_error, v, a, kappa
target_dim: 3     # v_ref, a_ref, kappa_ref
context_dim: 2    # pitch(rad), load(0=轻载/1=重载)
horizon: 30       # 历史窗口长度（H=30 → 3s 历史序列）
train_horizon: 30 # predictor 训练展开步数（3s rollout）

# predictor（LSTM 闭环动力学模型）
predictor_type: lstm
predictor_dropout: 0.1
predictor_max_range: 1.0
# lstm 专用参数（mlp_norm 的 hidden_dim/depth 对 lstm 无效）
lstm_hidden_size: 256
lstm_num_layers: 2
lstm_head_dim: 256
# 以下参数 lstm 模式下不使用，保留以兼容 parser
predictor_hidden_dim: 256
predictor_hidden_depth: 4
predictor_lr: 0.0001
predictor_weight_decay: 0.01
predictor_max_norm: 2
predictor_discount: 0.95
predictor_k_lateral: 0.0
predictor_k_s: 1.5
predictor_k_heading: 0.0
predictor_k_v: 3.0
predictor_k_a: 1.5
predictor_k_kappa: 0.0
predictor_stable_k: 0.0

# controller（mlp_norm，与 h30 版相同）
controller_type: mlp_norm
controller_dropout: 0.0
controller_max_range: 0.15
controller_hidden_dim: 256
controller_hidden_depth: 4
controller_lr: 0.0002
controller_max_norm: 2
controller_T_max: 30
controller_discount: 0.98
controller_train_horizon: 10
controller_smooth_k: 1.0
controller_stable_k: 0.0
controller_k_lateral: 0.0
controller_k_s: 0.5
controller_k_heading: 0.0
controller_k_v: 3.0
controller_k_a: 0.5
controller_k_kappa: 0.0

# Training ------------------------------
batch_size: 512           # LSTM BPTT 中间激活大，需要小 batch
predictor_epochs: 20
controller_epochs: 0
save_dir: state_dict/10s_h30_lstm
log_dir: logs/10s_h30_lstm

# Data ----------------------------------
data_step: 0.1
traj_duration: 10.0
traj_points: 100  # traj_duration / data_step
